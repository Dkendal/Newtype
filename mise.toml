[tasks.test]
alias = 't'
run = [{ task = 'test-rust' }, { task = 'test-conformance' }]

[tasks.test-rust]
alias = 'tr'
run = "cargo nextest run"

[tasks.test-conformance]
alias = 'tc'
run = '''
python3 scripts/conformance.py
'''

[tasks.gen-test]
alias = 'gt'
run = '''
cargo run -- --generate-tests
'''

[tasks.build]
run = "cargo build"

[tools]
jj = "latest"
